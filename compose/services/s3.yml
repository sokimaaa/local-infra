services:
  s3:
    image: localstack/localstack:${S3_IMAGE_TAG}
    container_name: ${COMPOSE_PROJECT_NAME}-s3
    ports:
      - "${S3_PORT}:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${S3_REGION}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      PERSISTENCE: 0
    volumes:
      - ./volumes/s3/init/10-create-buckets.sh:/etc/localstack/init/ready.d/10-create-buckets.sh:ro
    networks:
      - local-infra
