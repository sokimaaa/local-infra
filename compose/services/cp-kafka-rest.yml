services:
  cp-kafka-rest:
    image: confluentinc/cp-kafka-rest:${CP_KAFKA_PLATFORM_TAG}
    container_name: ${COMPOSE_PROJECT_NAME}-cp-kafka-rest
    hostname: cp-kafka-rest
    depends_on:
      cp-kafka:
        condition: service_healthy
      cp-schema-registry:
        condition: service_started
    ports:
      - "${CP_KAFKA_REST_PORT}:8082"
    environment:
      KAFKA_REST_HOST_NAME: cp-kafka-rest
      KAFKA_REST_BOOTSTRAP_SERVERS: PLAINTEXT://cp-kafka:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
      KAFKA_REST_SCHEMA_REGISTRY_URL: http://cp-schema-registry:8081
    networks:
      - local-infra
